<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaCanarinho - Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login-style.css">

    <meta name="view-transition" content="same-origin">
</head>


<body>

    <!-- CABEÇALHO (Igual ao login/index, mudando apenas a classe 'ativo') -->
    <header>
        <div class="logo">
            <img src="img/logo.svg" alt="Logomarca ReservaCanarinho">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="mesas.html">Mesas</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- CONTEÚDO PRINCIPAL: formulário de cadastro (RF01) -->
    <main class="main-login">
        <section class="conteudo-principal">
            <div class="container">
                <form action="" class="form" id="form-cadastro">
                    <legend>Criar conta</legend>

                    <div class="login-group">
                        <input type="text" name="nome" id="nome" placeholder="Nome completo">
                    </div>

                    <div class="login-group">
                        <input type="email" name="email" id="emailCadastro" placeholder="Email">
                    </div>

                    <div class="login-group">
                        <input type="tel" name="telefone" id="telefone" placeholder="Telefone">
                    </div>

                    <div class="login-group">
                        <input type="password" name="senha" id="senha" placeholder="Senha">
                        <span class="material-symbols-outlined" id="olhoSenha">visibility</span>
                    </div>

                    <button type="submit" class="btn-enviar">Cadastrar</button>

                    <p class="link-secundario">
                        Já tem uma conta? <a href="login.html">Entrar</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <!-- RODAPÉ (Igual para todas) -->
    <footer>
        <div class="logo-footer">
            <img src="img/logo.svg" alt="Logomarca ReservaCanarinho">
        </div>
        <div class="contato">
            <p>Contato: contato@reservacanarinho.com</p>
            <p>&copy; 2026 ReservaCanarinho. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Vínculo com o arquivo de lógica (toggle do olho, validação - quarta) -->
    <script src="./js/script.js"></script>
    <script src="./js/auth.js"></script>
</body>

</html>
