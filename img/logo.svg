<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Logomarca ReservaCanarinho">
  <!-- Círculo de fundo estilo "bola/campo" -->
  <circle cx="40" cy="40" r="32" fill="#0B5D3B"/>

  <!-- Linhas de campo estilizadas -->
  <path d="M 12 40 A 28 28 0 0 1 68 40" fill="none" stroke="#F4C542" stroke-width="3"/>
  <line x1="40" y1="12" x2="40" y2="68" stroke="#F4C542" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Mesa estilizada (retângulo + pernas) representando "reserva de mesa" -->
  <rect x="22" y="34" width="36" height="6" rx="2" fill="#FAFAF5"/>
  <line x1="28" y1="40" x2="28" y2="54" stroke="#FAFAF5" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="40" x2="52" y2="54" stroke="#FAFAF5" stroke-width="3" stroke-linecap="round"/>

  <!-- Estrela de destaque -->
  <path d="M40 18 L42.4 23 L48 23.8 L44 27.6 L45 33.2 L40 30.4 L35 33.2 L36 27.6 L32 23.8 L37.6 23 Z" fill="#F4C542"/>

  <!-- Texto -->
  <text x="84" y="36" font-family="Poppins, Montserrat, sans-serif" font-weight="700" font-size="22" fill="#06372A">Reserva</text>
  <text x="84" y="60" font-family="Poppins, Montserrat, sans-serif" font-weight="700" font-size="22" fill="#0B5D3B">Canarinho</text>
</svg>
