<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReservaCanarinho</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login-style.css">


    <meta name="view-transition" content="same-origin">
</head>


<body>

    <!-- CABEÇALHO (Igual ao index, mudando apenas a classe 'ativo') -->
    <header>
        <div class="logo">
            <img src="./img/logo.svg" alt="Logomarca ReservaCanarinho">
        </div>
        <nav>
            <ul>
                <li><a id="nav-inicio" href="index.html">Início</a></li>
                <li><a id="nav-mesas" href="mesas.html">Mesas</a></li>

                <!-- Itens de usuário logado (o JS vai mostrar/ocultar) -->
                <li><a id="nav-perfil" href="users.html">Perfil</a></li>
                <li><a id="nav-checkin" href="checkin.html">Check-in</a></li>
                <li><a id="btn-logout" href="#">Sair</a></li>

                <!-- Itens de usuário deslogado (o JS vai mostrar/ocultar) -->
                <li><a id="nav-login" href="login.html" class="ativo">Login</a></li>
                <li><a id="nav-cadastro" href="cadastro.html">Cadastro</a></li>
            </ul>
        </nav>
    </header>

    <!-- CONTEÚDO PRINCIPAL (Aqui entra o seu código específico de cada tela) -->
    <main class="main-login">
        <section class="conteudo-principal">
            <div class="container">
                <form action="" class="form" id="form-login">
                    <legend>Entrar</legend>
                    <div class="login-group">
                        <input type="text" name="login" id="login" placeholder="Email">
                    </div>
                    <div class="login-group">
                        <input type="password" name="senha" id="senha" placeholder="Senha">
                        <span class="material-symbols-outlined" id="olhoSenha">visibility</span>
                    </div>
                    <p class="link-secundario">
                        Esqueceu sua senha? <a href="#" onclick="simularRecuperacao(event)">Clique aqui!</a>
                    </p>
                    <button type="submit" class="btn-enviar">Entrar</button>
                    <p class="link-secundario">
                        Não possui uma conta? <a href="cadastro.html">Cadastre-se!</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <!-- RODAPÉ (Igual para todas) -->
    <footer>
        <div class="logo-footer">
            <img src="./img/logo.svg" alt="Logomarca ReservaCanarinho">
        </div>
        <div class="contato">
            <p>Contato: contato@reservacanarinho.com</p>
            <p>&copy; 2026 ReservaCanarinho. Todos os direitos reservados.</p>
        </div>
    </footer>

    <!-- Vínculo com o seu arquivo de lógica que será feito na quarta -->
    <script src="./js/script.js"></script>
    <script src="./js/auth.js"></script>
</body>

</html>
